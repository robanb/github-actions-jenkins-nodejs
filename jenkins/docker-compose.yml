# Local Jenkins LTS for github-actions-jenkins-nodejs.
#
#   Build + start: docker compose -f jenkins/docker-compose.yml up -d --build
#   Stop:          docker compose -f jenkins/docker-compose.yml down
#   Wipe state:    docker compose -f jenkins/docker-compose.yml down -v
#
# See docs/JENKINS.md for the full walkthrough.

services:
  jenkins:
    build: .
    image: gajn-jenkins:local
    container_name: gajn-jenkins
    restart: unless-stopped

    ports:
      - "8080:8080"     # Web UI
      - "50000:50000"   # Inbound agent port (reserved, unused in this lab)

    environment:
      # Skip the first-run unlock wizard — JCasC seeds the admin user.
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
      # Point the Configuration-as-Code plugin at the mounted YAML.
      CASC_JENKINS_CONFIG: /var/jenkins_conf/casc.yaml
      # Admin credentials. Override in jenkins/.env (gitignored).
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_ID:-admin}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD:-admin}

    volumes:
      - jenkins_home:/var/jenkins_home
      - ./casc.yaml:/var/jenkins_conf/casc.yaml:ro

volumes:
  jenkins_home:
