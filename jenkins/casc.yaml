# Jenkins Configuration-as-Code for github-actions-jenkins-nodejs.
#
# Loaded at startup via the CASC_JENKINS_CONFIG env var set in
# docker-compose.yml. Edit this file and restart the container (or click
# "Reload existing configuration" in Manage Jenkins -> Configuration as
# Code) to apply changes.
#
# Scope: skip the first-run wizard, seed a local admin, and pre-install
# two Node.js tool installations. Everything else — creating the pipeline
# job, running it — is done manually through the UI so you can see how
# Jenkins actually works. docs/JENKINS.md walks through every click.

jenkins:
  systemMessage: "github-actions-jenkins-nodejs :: local Jenkins LTS"
  numExecutors: 2
  mode: NORMAL

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_ID:-admin}"
          password: "${JENKINS_ADMIN_PASSWORD:-admin}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

tool:
  nodejs:
    installations:
      - name: "Node 18"
        properties:
          - installSource:
              installers:
                - nodeJSInstaller:
                    id: "18.20.4"
      - name: "Node 20"
        properties:
          - installSource:
              installers:
                - nodeJSInstaller:
                    id: "20.18.0"

unclassified:
  location:
    url: "http://localhost:8080/"
    adminAddress: "admin@local"
